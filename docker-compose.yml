services:
  lb:
    image: haproxy:2.8-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./deploy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - lb_sockets:/run/sockets
    depends_on:
      - api-1
      - api-2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "32M"

  api-1:
    build: .
    platform: linux/amd64
    environment:
      LISTEN: "unix:/run/sockets/api-1.sock"
      REFERENCE_PATH: /data/references.rbin
      REFERENCE_IVF_PATH: /data/references.ivf
      DATA_DIR: /app/data
      KNN_MODE: "ivf"
      KNN_NPROBE: "16"
      KNN_IVF_MAX_CANDIDATES: "10000"
      KNN_WORKERS: "0"
      KNN_PARALLEL_MIN_SCAN: "200000000"
      GOMAXPROCS: "1"
      GOGC: "200"
      HEIMDALL_MEM_LIMIT_BYTES: "120000000"
      MIN_REFERENCES: "2000000"
      WARMUP: "1"
      METRICS: "0"
    volumes:
      - ./data:/data:ro
      - lb_sockets:/run/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "159M"

  api-2:
    build: .
    platform: linux/amd64
    environment:
      LISTEN: "unix:/run/sockets/api-2.sock"
      REFERENCE_PATH: /data/references.rbin
      REFERENCE_IVF_PATH: /data/references.ivf
      DATA_DIR: /app/data
      KNN_MODE: "ivf"
      KNN_NPROBE: "16"
      KNN_IVF_MAX_CANDIDATES: "10000"
      KNN_WORKERS: "0"
      KNN_PARALLEL_MIN_SCAN: "200000000"
      GOMAXPROCS: "1"
      GOGC: "200"
      HEIMDALL_MEM_LIMIT_BYTES: "120000000"
      MIN_REFERENCES: "2000000"
      WARMUP: "1"
      METRICS: "0"
    volumes:
      - ./data:/data:ro
      - lb_sockets:/run/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "159M"

volumes:
  lb_sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
