global
    maxconn 16384
    # 0.10 CPU: 1 thread evita contenção de scheduler.
    nbthread 1
    # Buffer maior reduz syscalls em payloads de ~1-2 KB do /fraud-score.
    tune.bufsize 16384

defaults
    # mode tcp: HAProxy não parsa HTTP, só faz proxy de bytes.
    # As APIs falam HTTP/1.1 nativo no socket Unix; o keep-alive é fim a fim
    # entre k6 ↔ haproxy ↔ api (mesma conexão TCP, sem dissociação por request).
    # Ganho: ~50-200 µs por request a menos no LB.
    mode tcp
    option dontlog-normal
    no log
    timeout connect 50ms
    timeout client 5000ms
    timeout server 5000ms

frontend fraud_front
    bind *:9999
    default_backend fraud_back

backend fraud_back
    balance roundrobin
    # check tcp em socket Unix valida só conectividade; saúde HTTP fica a cargo
    # do warmup container (que pisca /ready no boot).
    server s1 unix@/run/sockets/api-1.sock check inter 2s fall 3 rise 2 maxconn 8192
    server s2 unix@/run/sockets/api-2.sock check inter 2s fall 3 rise 2 maxconn 8192
