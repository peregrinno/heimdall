global
    maxconn 8192
    # 0.10 CPU: 1 thread evita contenção de scheduler.
    nbthread 1

defaults
    mode http
    option dontlognull
    option http-keep-alive
    # Latência: timeout connect curto e server tolerante a picos de page fault.
    timeout connect 1s
    timeout client 5s
    timeout server 10s
    timeout http-request 5s
    timeout http-keep-alive 60s

frontend fe
    bind *:9999
    default_backend apis

backend apis
    balance roundrobin
    option http-keep-alive
    http-reuse always
    # Health-check leve; sem reconectar com latência alta sob fila.
    server s1 unix@/run/sockets/api-1.sock check inter 2s fall 3 rise 2 maxconn 4096
    server s2 unix@/run/sockets/api-2.sock check inter 2s fall 3 rise 2 maxconn 4096
