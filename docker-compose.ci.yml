services:
  lb:
    image: haproxy:2.8-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./deploy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - lb_sockets:/run/sockets
    depends_on:
      - api-1
      - api-2

  api-1:
    build: .
    platform: linux/amd64
    environment:
      LISTEN: "unix:/run/sockets/api-1.sock"
      REFERENCE_PATH: /app/data/references.rbin
      DATA_DIR: /app/data
      KNN_MODE: "exact"
      MIN_REFERENCES: "0"
      ALLOW_SMALL_REFERENCES: "1"
      WARMUP: "0"
      METRICS: "0"
    volumes:
      - lb_sockets:/run/sockets

  api-2:
    build: .
    platform: linux/amd64
    environment:
      LISTEN: "unix:/run/sockets/api-2.sock"
      REFERENCE_PATH: /app/data/references.rbin
      DATA_DIR: /app/data
      KNN_MODE: "exact"
      MIN_REFERENCES: "0"
      ALLOW_SMALL_REFERENCES: "1"
      WARMUP: "0"
      METRICS: "0"
    volumes:
      - lb_sockets:/run/sockets

volumes:
  lb_sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
